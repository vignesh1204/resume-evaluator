services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    environment:
      - CORS_ORIGIN=http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - resume_cache:/app/.cache_resume
      - score_cache:/app/.cache_score
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  resume_cache:
  score_cache:
